name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run validation without publishing
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run release:check

      - name: Verify CLI dependency shape
        run: |
          node --input-type=module -e '
            import pkg from "./packages/argue-cli/package.json" with { type: "json" };
            const value = pkg.dependencies?.["@onevcat/argue"];
            if (!value) {
              throw new Error("Missing @onevcat/argue dependency");
            }
            if (value.startsWith("file:") || value.startsWith("workspace:")) {
              throw new Error(`CLI dependency must be a semver range, got ${value}`);
            }
          '

      - name: Detect and publish changed packages
        if: ${{ github.ref_type == 'tag' }}
        run: |
          publish_if_needed() {
            local workspace="$1"
            local pkg_name="$2"

            local local_version
            local_version=$(node --input-type=module -e "
              import pkg from './${workspace}/package.json' with { type: 'json' };
              console.log(pkg.version);
            ")

            local registry_version
            registry_version=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")

            echo "  ${pkg_name}: local=${local_version} registry=${registry_version}"

            if [ "$local_version" != "$registry_version" ]; then
              echo "  -> Publishing ${pkg_name}@${local_version}"
              npm publish --workspace "$workspace" --access public --provenance
            else
              echo "  -> Already published, skipping"
            fi
          }

          echo "Checking packages..."
          publish_if_needed "packages/argue" "@onevcat/argue"
          publish_if_needed "packages/argue-cli" "@onevcat/argue-cli"
